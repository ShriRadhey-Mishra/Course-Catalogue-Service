spring:
  application:
    name: course-catalogue-service
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database: h2
    database-platform: org.hibernate.dialect.H2Dialect
    generate-ddl: true
    show-sql: true
    hibernate:
      ddl-auto: create
  h2:
    console:
      enabled: true
message: Hello, from default profile!

---

spring:
  config:
    activate:
      on-profile: dev
message: Hello, from dev profile!

---

spring:
  config:
    activate:
      on-profile: prod
message: Hello, from prod profile!